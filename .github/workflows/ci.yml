name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs to avoid burning CI minutes on stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.4.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python (from .python-version)
        run: uv python install

      - name: Sync deps (locked)
        run: uv sync --locked --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright src tests scripts

      - name: Pytest
        run: uv run pytest -q

      # `--locked` (not `--check`): the assert flag in uv 0.4.x; `--check`
      # only exists from 0.5.x and fails here as an unknown argument.
      - name: uv.lock is up-to-date with pyproject.toml
        run: uv lock --locked

  validate-stac:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v6
      # hashFiles() is step-context-only; a job-level `if` with it fails the
      # whole workflow at compile time ("No jobs were run"). Guard per step.
      - name: Check for STAC catalog
        id: stac
        run: |
          if [ -f stac/catalog.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "stac/catalog.json not present yet — skipping validation"
          fi
      - if: steps.stac.outputs.present == 'true'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.4.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - if: steps.stac.outputs.present == 'true'
        run: uv python install
      - if: steps.stac.outputs.present == 'true'
        run: uv sync --locked --extra dev
      - if: steps.stac.outputs.present == 'true'
        run: uv run stac-validator validate stac/catalog.json --recursive

  validate-schemas:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.4.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install
      - run: uv sync --locked --extra dev
      # exposure_score.yaml: weights must sum to 1.0
      - name: Validate exposure-score weights
        run: |
          uv run python - <<'PY'
          import yaml, pathlib, sys
          cfg = yaml.safe_load(pathlib.Path("config/exposure_score.yaml").read_text())
          total = sum(cfg["weights"].values())
          if abs(total - 1.0) > 1e-9:
              print(f"FAIL: exposure_score.yaml weights sum to {total}, expected 1.0")
              sys.exit(1)
          print(f"OK: {len(cfg['weights'])} weights, sum = {total}")
          PY
      # critical_infrastructure.yaml: every class has required fields
      - name: Validate critical-infrastructure taxonomy
        run: |
          uv run python - <<'PY'
          import yaml, pathlib, sys
          tax = yaml.safe_load(pathlib.Path("data/taxonomy/critical_infrastructure.yaml").read_text())
          required = {"name", "osm_filters", "buffer_radius_m", "criticality_weight"}
          for cid, c in tax["classes"].items():
              missing = required - set(c.keys())
              if missing:
                  print(f"FAIL: class {cid!r} missing {missing}")
                  sys.exit(1)
          print(f"OK: {len(tax['classes'])} infrastructure classes validated")
          PY
      # committed sample STAC manifest must parse as StacManifest
      - name: Validate sample STAC manifest
        run: |
          uv run python - <<'PY'
          import json, pathlib
          from wildfire_exposure_eo.schemas import StacManifest
          raw = json.loads(pathlib.Path("docs/samples/stac_smoke_aveiro.json").read_text())
          m = StacManifest.model_validate(raw)
          print(f"OK: {sum(m.totals.values())} items across {len(m.totals)} collections")
          PY
      # OSM asset schema: build synthetic records from fixture and Pydantic-validate
      - name: Validate OSM asset schema
        run: |
          uv run python - <<'PY'
          import json, pathlib
          from datetime import datetime, UTC
          from shapely.geometry import Point
          from wildfire_exposure_eo.schemas import OsmAsset, OsmAssetProvenance
          fixture = json.loads(pathlib.Path("tests/fixtures/overpass/nodes_power_tower.json").read_text())
          prov = OsmAssetProvenance(
              osm_snapshot_iso=datetime.fromisoformat(fixture["osm3s"]["timestamp_osm_base"].rstrip("Z") + "+00:00"),
              overpass_endpoint="https://overpass-api.de/api/interpreter",
              overpass_query_sha="a" * 64,
              taxonomy_sha="b" * 64,
              taxonomy_version="0.1.0-draft",
              run_id="ci-test",
              code_commit_sha="abc123",
              aoi_path="data/aoi/smoke.geojson",
              aoi_geometry_sha="c" * 64,
          )
          nodes = [el for el in fixture["elements"] if el.get("type") == "node" and "tags" in el]
          for el in nodes:
              pt = Point(el["lon"], el["lat"])
              OsmAsset.model_validate({
                  "asset_id": f"osm:node/{el['id']}",
                  "osm_type": "node",
                  "osm_id": el["id"],
                  "asset_class": "power.tower",
                  "geometry_wkb": pt.wkb,
                  "centroid_lon": el["lon"],
                  "centroid_lat": el["lat"],
                  "tags": json.dumps(el.get("tags", {})),
                  "provenance": prov,
              })
          print(f"OK: {len(nodes)} OsmAsset records validated")
          PY
      # crosswalk YAML: source_inputs and internal_classes present
      - name: Validate fuel crosswalk
        run: |
          uv run python - <<'PY'
          import yaml, pathlib, sys
          cw = yaml.safe_load(pathlib.Path("data/crosswalks/icnf_to_scott_burgan.yaml").read_text())
          for key in ("source_inputs", "internal_classes", "fbfm40_reference", "crosswalk"):
              if key not in cw:
                  print(f"FAIL: crosswalk missing top-level key {key!r}")
                  sys.exit(1)
          print(f"OK: crosswalk has all required top-level keys")
          PY
      # ICNF burn-perimeter schema: build synthetic records from fixture and Pydantic-validate
      - name: Validate burn-perimeter schema
        run: |
          uv run python - <<'PY'
          import json, pathlib
          from datetime import datetime, UTC
          from shapely.geometry import Polygon
          from wildfire_exposure_eo.schemas import (
              BurnPerimeter, BurnPerimeterProvenance, IcnfLayerDescriptor,
          )
          fixture = json.loads(
              pathlib.Path("tests/fixtures/icnf/layer_query_2017.json").read_text()
          )
          prov = BurnPerimeterProvenance(
              icnf_layer_id=3,
              icnf_layer_name="Áreas Ardidas 2017",
              vintage_year=2017,
              mapserver_url="https://sigservices.icnf.pt/server/rest/services/BDG/areas_ardidas/MapServer",
              fetched_at_utc=datetime(2026, 6, 1, tzinfo=UTC),
              run_id="ci-test",
              code_commit_sha="abc123",
              aoi_path="data/aoi/smoke.geojson",
              aoi_geometry_sha="c" * 64,
          )
          for feat in fixture["features"]:
              attrs = feat["attributes"]
              rings = feat["geometry"]["rings"]
              poly = Polygon(rings[0])
              IcnfLayerDescriptor(
                  layer_id=3, year=2017, name="Áreas Ardidas 2017", feature_count_total=3
              )
              BurnPerimeter.model_validate({
                  "row_id": f"icnf:2017:{attrs['OBJECTID']}",
                  "vintage_year": attrs["ANO"],
                  "icnf_feature_id": attrs["OBJECTID"],
                  "geometry_wkb": poly.wkb,
                  "area_ha": attrs["AREA_HA"],
                  "provenance": prov,
              })
          print(f"OK: {len(fixture['features'])} BurnPerimeter records validated")
          PY
