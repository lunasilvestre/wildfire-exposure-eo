name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync deps (locked)
        run: uv sync --locked --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright src tests scripts

      - name: Pytest
        run: uv run pytest -q

  validate-stac:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: hashFiles('stac/catalog.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv run --with stac-validator stac-validator stac/catalog.json --recursive
