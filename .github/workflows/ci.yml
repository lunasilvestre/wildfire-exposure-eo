name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs to avoid burning CI minutes on stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python (from .python-version)
        run: uv python install

      - name: Sync deps (locked)
        run: uv sync --locked --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright src tests scripts

      - name: Pytest
        run: uv run pytest -q

      # `--locked` (not `--check`): the assert flag in uv 0.4.x; `--check`
      # only exists from 0.5.x and fails here as an unknown argument.
      - name: uv.lock is up-to-date with pyproject.toml
        run: uv lock --locked

  validate-stac:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      # hashFiles() is step-context-only; a job-level `if` with it fails the
      # whole workflow at compile time ("No jobs were run"). Guard per step.
      - name: Check for STAC catalog
        id: stac
        run: |
          if [ -f stac/catalog.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "stac/catalog.json not present yet — skipping validation"
          fi
      - if: steps.stac.outputs.present == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - if: steps.stac.outputs.present == 'true'
        run: uv python install
      - if: steps.stac.outputs.present == 'true'
        run: uv sync --locked --extra dev
      - if: steps.stac.outputs.present == 'true'
        run: uv run stac-validator stac/catalog.json --recursive

  validate-schemas:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install
      - run: uv sync --locked --extra dev
      # exposure_score.yaml: weights must sum to 1.0
      - name: Validate exposure-score weights
        run: |
          uv run python - <<'PY'
          import yaml, pathlib, sys
          cfg = yaml.safe_load(pathlib.Path("config/exposure_score.yaml").read_text())
          total = sum(cfg["weights"].values())
          if abs(total - 1.0) > 1e-9:
              print(f"FAIL: exposure_score.yaml weights sum to {total}, expected 1.0")
              sys.exit(1)
          print(f"OK: {len(cfg['weights'])} weights, sum = {total}")
          PY
      # critical_infrastructure.yaml: every class has required fields
      - name: Validate critical-infrastructure taxonomy
        run: |
          uv run python - <<'PY'
          import yaml, pathlib, sys
          tax = yaml.safe_load(pathlib.Path("data/taxonomy/critical_infrastructure.yaml").read_text())
          required = {"name", "osm_filters", "buffer_radius_m", "criticality_weight"}
          for cid, c in tax["classes"].items():
              missing = required - set(c.keys())
              if missing:
                  print(f"FAIL: class {cid!r} missing {missing}")
                  sys.exit(1)
          print(f"OK: {len(tax['classes'])} infrastructure classes validated")
          PY
      # crosswalk YAML: source_inputs and internal_classes present
      - name: Validate fuel crosswalk
        run: |
          uv run python - <<'PY'
          import yaml, pathlib, sys
          cw = yaml.safe_load(pathlib.Path("data/crosswalks/icnf_to_scott_burgan.yaml").read_text())
          for key in ("source_inputs", "internal_classes", "fbfm40_reference", "crosswalk"):
              if key not in cw:
                  print(f"FAIL: crosswalk missing top-level key {key!r}")
                  sys.exit(1)
          print(f"OK: crosswalk has all required top-level keys")
          PY
