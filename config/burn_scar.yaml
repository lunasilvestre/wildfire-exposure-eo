# Burn-scar inference (Stage 1b, WU-1) — operational config for prompt 09.
#
# Model ID + revision verified live against the Hugging Face API on 2026-06-09
# (CLAUDE.md non-negotiable #1): https://huggingface.co/api/models/ibm-nasa-geospatial/Prithvi-EO-2.0-300M-BurnScars
# Normalisation means/stds are NOT duplicated here — they are read at runtime
# from the model's own burn_scars_config.yaml at the pinned revision, so the
# weights and their preprocessing constants can never drift apart.
#
# Parsed and validated as `wildfire_exposure_eo.schemas.BurnScarConfig`.

model:
  family: "prithvi-eo-2.0"
  downstream_task: "burn-scar"
  hf_model_id: "ibm-nasa-geospatial/Prithvi-EO-2.0-300M-BurnScars"
  hf_revision_sha: "a3f2c410e45b8ac7417976614528a872f024d831"
  backbone_param_count: 300000000
  checkpoint_file: "Prithvi_EO_V2_300M_BurnScars.pt"
  config_file: "burn_scars_config.yaml"

inference:
  window_months: 12
  s2_max_cloud_cover: 30
  # Downstream contract only: the COG stays a probability raster; thresholding
  # happens in the Stage-2 `recent_burn_share_12mo` feature, never here.
  binarisation_threshold: 0.5
  output_format: "cog"
  # HLS-heritage band order the checkpoint was trained on, as native S2 L2A
  # asset keys. NIR_NARROW is B8A (not B08): Prithvi's burn-scar fine-tune
  # uses the narrow NIR band per its published config.
  s2_assets: ["B02", "B03", "B04", "B8A", "B11", "B12"]
  # S2 SCL classes masked out per scene before the composite reducer:
  # 0 no-data, 1 saturated/defective, 3 cloud shadow, 5 bare soil, 8 cloud
  # medium prob, 9 cloud high prob, 10 thin cirrus, 11 snow/ice.
  # SCL 5 (bare soil) added in WU-10: post-harvest bare soil and tilled
  # agriculture are spectrally confused with char by the US-HLS-trained
  # checkpoint, driving false positives on unburned land.
  scl_mask_classes: [0, 1, 3, 5, 8, 9, 10, 11]
  # Composite reducer applied across the scene stack (WU-10).
  # Options: max | median | p75 | p85 | p90 | consensus_N
  # (consensus_N: a pixel scores 1.0 only when the fraction of scenes with
  # per-scene score >=0.5 exceeds N/10, e.g. consensus_5 = majority vote).
  # Default p85 keeps the upper tail but discards single-scene spikes that a
  # per-pixel max composite would otherwise persist across the whole window.
  reducer: "p85"
  # Only include S2 scenes whose acquisition month falls within this range.
  # Months are 1-indexed, inclusive. Jun-Oct aligns with ICNF's principal
  # fire season for mainland Portugal — off-season scenes carry no fresh burn
  # scar and only add spectral-confusion false positives to the composite.
  season_start_month: 6
  season_end_month: 10
  # Sliding-window size matches the 512x512 chips the fine-tune was trained
  # on; stride < size so terratorch's tiled_inference blends overlaps.
  tile_size: 512
  # WU-11 de-grid FIX: stride <= tile/2 so terratorch's cosine blend window spans
  # the whole crop and divides out the per-crop ViT center-bias tent WITHIN each
  # scene. The prior 448 stride left only 64px overlap (56px blend ramp) — the
  # tent sat in the flat-weight 384px core and survived stitching (jitter+p85
  # only halved it: autocorr 0.467->0.204). At 256 the blend reaches the tent.
  tile_stride: 256
  # De-grid (WU-10). terratorch tiled_inference anchors a fixed axis-aligned
  # crop lattice (origin 0,0; stride tile_stride) on every scene. Each
  # Prithvi/ViT 512px crop has a tent-shaped class-1 response (~5x core/border)
  # phase-locked to the same UTM grid across all scenes, so a per-pixel
  # composite stacks every tent at the same pixels into a saturated grid of
  # squares. Jittering the crop-grid ORIGIN by a deterministic per-scene offset
  # (seed 42 + STAC item id) lands the tent at different pixels each scene, so
  # the p85 composite averages it out. Inverted per scene, so the composite
  # stays on the common grid. See burn_scar.scene_origin_offset.
  tile_origin_jitter: true
