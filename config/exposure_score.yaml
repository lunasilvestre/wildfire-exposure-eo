# config/exposure_score.yaml
# ───────────────────────────────────────────────────────────────────
# Composite per-asset wildfire-exposure score.
#
# The score is a deliberately transparent linear combination of
# normalised features. No black-box ensemble; any reviewer should be
# able to read the formula here and reproduce a per-asset score by
# hand if they had to.
#
# Output:    0.0 - 1.0 per asset, percentile-ranked within the AOI.
# Semantics: RELATIVE rank, not a calibrated probability.
#            See CLAUDE.md non-negotiable #6.
#
# Weights MUST sum to 1.0. CI asserts this.
# ───────────────────────────────────────────────────────────────────

# Changelog
#   0.3.0 (2026-06-16): RESTORE the fire-weather dimension dropped in 0.2.0,
#     now sourced from the verified CEMS EWDS `cems-fire-historical-v1`
#     current-season FWI (DOI 10.24381/cds.0e89c522; see config/fire_weather.yaml
#     §ewds_fwi and scripts/22_ewds_fwi_audit.py). The Canadian Fire Weather
#     Index composite (`fwi_fwi_current`) takes a 0.10 weight; the six remaining
#     weights are restored to their pre-0.2.0 values so the seven sum to exactly
#     1.0. Approved by Nelson 2026-06-16. Only the COMPOSITE FWI is weighted —
#     the six FWI *components* (bui/dc/dmc/ffmc/isi/bi) and the three topology
#     features stay AVAILABLE-but-UNWEIGHTED: the composite FWI already
#     integrates its components, and topology defers to Wave-2 validation. The
#     operational pilot re-score uses CURRENT-season FWI; it is NOT validated
#     against historical ICNF burns (temporal mismatch — backdated FWI vs
#     burn-season is a separate pending step; see docs/validation_report.md).
#   0.2.0 (2026-06-11, WU-6): dropped `fwi_p95_recent_season`. There is no
#     GREEN, documented, *public programmatic* source for daily FWI verifiable
#     in-session — the audit's "IPMA FWI" row is only a reachability probe of
#     the IPMA web page (no public REST API; Copernicus CDS needs an account;
#     see docs/data_sources.md §IPMA and src/.../audit.py:check_ipma_fwi). Per
#     the pre-approved close-out fallback (prompts/10_asset_features_score.md,
#     Nelson 2026-06-11), the six remaining weights are renormalised
#     proportionally (each old weight ÷ 0.90) so they still sum to exactly 1.0.
#     FWI returns as future work behind a verified IPMA/Copernicus fetcher.
#   0.1.0: initial seven-feature linear screen.
version: "0.3.0"
formula: "linear_combination"
normalization: "percentile_rank_within_aoi"

weights:
  # Fuel character (Stage 1 model output)
  fuel_class_severity_weight: 0.30           # crosswalk-derived per-class severity

  # Vegetation structure (canopy height)
  canopy_height_p90_m: 0.20                  # ETH GCH 10m, p90 inside buffer

  # Topographic forcing
  slope_max_deg: 0.10                        # Cop-DEM GLO-30, max slope inside buffer

  # Burn history (decadal pattern; ICNF Áreas Ardidas, ~1-year publication lag)
  historical_burn_share: 0.15

  # Current-season burn signal (Prithvi-Burn-Scar inference on S2, last 12 months)
  recent_burn_share_12mo: 0.10

  # Recent spectral change (Sentinel-2 spring-vs-late-summer NBR delta)
  nbr_delta_recent: 0.05

  # Fire weather (RESTORED 0.3.0): CEMS EWDS current-season Canadian Fire Weather
  # Index composite. COMPOSITE ONLY — the six FWI components stay unweighted (the
  # composite already integrates them). An observed reanalysis danger *index*,
  # one normalised input to a relative rank — never a probability or forecast.
  fwi_fwi_current: 0.10

# ───────────────────────────────────────────────────────────────────
# Feature normalisation
# ───────────────────────────────────────────────────────────────────
# Each feature is rank-transformed within the AOI before weighting,
# producing comparable [0,1] inputs regardless of native units. This
# eliminates the need for hand-tuned scaling and keeps the score
# interpretable as "where does this asset sit in the AOI distribution
# of feature X?"
feature_normalization:
  default: "percentile_rank"
  per_feature_overrides: {}          # exceptions go here, with comments

# ───────────────────────────────────────────────────────────────────
# Aggregation across asset-class portfolios
# ───────────────────────────────────────────────────────────────────
# When asked "what is my circuit-level / municipality-level exposure?",
# we aggregate per-asset scores weighted by `criticality_weight` from
# data/taxonomy/critical_infrastructure.yaml.
portfolio_aggregation:
  method: "criticality_weighted_mean"
  criticality_source: "data/taxonomy/critical_infrastructure.yaml"

# ───────────────────────────────────────────────────────────────────
# Calibration
# ───────────────────────────────────────────────────────────────────
# We REPORT calibration against historical-burn validation. We do NOT
# promise calibrated probabilities. See docs/validation_report.md.
calibration:
  method: "report_only"
  validation_target: "icnf-areas-ardidas-2017-2024"
  metrics:
    - "lift_chart"
    - "spearman_rank_correlation"
    - "brier_score"
