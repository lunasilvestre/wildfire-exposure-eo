# config/fuel_crosswalk.yaml
# ─────────────────────────────────────────────────────────────────────────────
# EFFIS NFFL-13 → internal fuel-class + severity crosswalk (version 0.1.0)
#
# Maps each Anderson (1982) / NFFL fire-behavior fuel model code found in the
# EFFIS European Fuel Map raster to an internal fuel class and a severity
# weight used in the composite exposure score.
#
# Epistemological status: severities are EXPERT-SET CONSTANTS — they carry the
# same epistemic status as the composite score weights in exposure_score.yaml
# (transparent, expert-elicited, not learned from data). They are calibrated
# against the Scott & Burgan (2005) relative fire-behaviour intensity hierarchy
# and the Portuguese literature (Fernandes 2009, Sá et al. 2023), not
# estimated from held-out fire data.
#
# EFFIS source: Aragoneses et al. 2023 — "Classification and mapping of
# European fuels using a hierarchical, multipurpose fuel classification
# system", ESSD 15, 1287–1300.  https://essd.copernicus.org/articles/15/1287/2023/
#
# Internal classes are defined in data/crosswalks/icnf_to_scott_burgan.yaml.
# The severity values here are consistent with the internal_classes.severity_weight
# values in that file.
#
# Unmapped EFFIS codes encountered at runtime are a hard error (CLAUDE.md #1:
# no invented mappings). Add the code here with an explicit comment instead.
#
# EFFIS native resolution: 250 m (EPSG:3035 LAEA, uint8, nodata=0).
# ─────────────────────────────────────────────────────────────────────────────

version: "0.1.0"
source: "EFFIS European Fuel Map (Aragoneses et al. 2023)"
source_taxonomy: "Anderson (1982) NFFL 13-class fire-behavior fuel models"
internal_taxonomy_ref: "data/crosswalks/icnf_to_scott_burgan.yaml"

# Grass severity at which COSc herbaceous pixels override EFFIS forest codes.
# Applied by refine_with_cosc rule 2: COSc spontaneous herbaceous (420) where
# EFFIS says forest (codes 8-10) → trust COSc state, downgrade to this severity.
cosc_herbaceous_override_severity: 0.40

entries:
  # ── Grass group (Anderson models 1–3) ──────────────────────────────────────

  - effis_code: 1
    nffl_name: "Short, sparse, dry-climate grass"
    internal_class: "grass"
    severity: 0.35
    comment: >
      Anderson M1 — low-load annual grass, open areas and roadsides. Equivalent to
      Scott & Burgan GR1. Fast spread but low flame length; moderate hazard for
      linear infrastructure. Typical post-fire or over-grazed herbaceous patches.

  - effis_code: 2
    nffl_name: "Moderate load, dry-climate grass"
    internal_class: "grass"
    severity: 0.40
    comment: >
      Anderson M2 — moderate-load grazed grass (GR2 equivalent). Continuous cover
      promotes lateral fire spread; hazard higher than M1 due to greater fuel load.
      Common in semi-abandoned agricultural margins in the Douro and Tejo catchments.

  - effis_code: 3
    nffl_name: "Tall grass, continuous"
    internal_class: "grass"
    severity: 0.50
    comment: >
      Anderson M3 — high-load tall grass (GR3/GR5 humid-climate equivalent). Dense
      continuous sward; rapid fire spread and higher intensity than M1–2. Associated
      with permanent improved pasture or wet-climate grass assemblages in the Norte.

  # ── Shrub group (Anderson models 4–7) ─────────────────────────────────────

  - effis_code: 4
    nffl_name: "Chaparral, dense shrub >2 m"
    internal_class: "shrub-tall"
    severity: 0.80
    comment: >
      Anderson M4 — dense tall chaparral or macchia (SH7/SH9 equivalent). Very high
      load, continuous cover, crown-fire potential in upslope wind. In Portugal,
      analogous to mature dense Cytisus multiflorus / Ulex europaeus stands.

  - effis_code: 5
    nffl_name: "Young, low-stature brush"
    internal_class: "shrub-low"
    severity: 0.55
    comment: >
      Anderson M5 — low-load young shrub <1 m, recently re-sprouted post-fire or
      along open margins (SH1/SH2 equivalent). Low flame length but sustained
      ignition risk. Typical of matos baixos: young Erica / Cistus.

  - effis_code: 6
    nffl_name: "Dormant brush, hardwood slash"
    internal_class: "shrub-low"
    severity: 0.50
    comment: >
      Anderson M6 — moderate-load dormant or senescent shrub (SH3/SH4 equivalent).
      Slightly lower severity than active-season M5 due to lower moisture content
      variability. Associated with open-woodland understorey in transition periods.

  - effis_code: 7
    nffl_name: "Southern rough (Palmetto-gallberry)"
    internal_class: "shrub-tall"
    severity: 0.70
    comment: >
      Anderson M7 — high-load humid-climate tall shrub (SH6/SH8 equivalent).
      No direct Portuguese analogue; mapped to shrub-tall given load and structure.
      Severity lower than M4 because this model assumes poorer continuity.

  # ── Timber litter group (Anderson models 8–10) ────────────────────────────

  - effis_code: 8
    nffl_name: "Compact conifer litter"
    internal_class: "conifer-closed"
    severity: 0.70
    comment: >
      Anderson M8 — closed-canopy conifer stand with compact, deep-packed needle
      litter (TL1/TL3 equivalent). Moderately severe ground fire; suppressed
      understorey limits surface spread. In Portugal: mature Pinus pinea or
      heavily shaded Pinus pinaster with minimal shrub layer.

  - effis_code: 9
    nffl_name: "Hardwood litter, loose and fluffy"
    internal_class: "broadleaf-open"
    severity: 0.55
    comment: >
      Anderson M9 — open-canopy broadleaf with loose, airy leaf litter
      (TL2/TL6 equivalent). Curled litter allows rapid fire spread despite moderate
      load. In Portugal: open Quercus suber / Q. pyrenaica woodland or open
      Eucalyptus with unmanaged litter. COSc code 311 (Sobreiro/Azinheira) and 313
      (other broadleaf) commonly coincide with this EFFIS class.

  - effis_code: 10
    nffl_name: "Timber with understory, large downed logs"
    internal_class: "conifer-closed"
    severity: 0.85
    comment: >
      Anderson M10 — heavy-load timber stand with shrub/grass understory and large
      downed debris (TL5/TU2 equivalent). High severity potential; understory
      provides ladder fuel. In Portugal: mature Pinus pinaster or dense Eucalyptus
      globulus (COSc 312/321) with accumulated bark and litter. Dominant class
      in the Sever do Vouga / Pampilhosa pilot AOI (34.9% of EFFIS pixels).

  # ── Slash group (Anderson models 11–13) ───────────────────────────────────

  - effis_code: 11
    nffl_name: "Light slash"
    internal_class: "mixed-forest"
    severity: 0.55
    comment: >
      Anderson M11 — lightly thinned or recently harvested stands with scattered
      logging debris (SB1 equivalent). Mixed character — standing trees plus
      surface debris. Severity moderate. Not expected in the pilot AOI.

  - effis_code: 12
    nffl_name: "Medium slash"
    internal_class: "mixed-forest"
    severity: 0.70
    comment: >
      Anderson M12 — medium-load activity fuel or harvest residue (SB2 equivalent).
      Significant loading of down and dead material. Severity similar to tall shrub.

  - effis_code: 13
    nffl_name: "Heavy slash"
    internal_class: "conifer-closed"
    severity: 0.90
    comment: >
      Anderson M13 — very high load slash or blowdown (SB3/SB4 equivalent).
      Extreme potential fire behaviour; the most severe burnable EFFIS class.
      Treated as conifer-closed (same severity ceiling) for the exposure score.

# ─────────────────────────────────────────────────────────────────────────────
# References
# ─────────────────────────────────────────────────────────────────────────────
references:
  - "Anderson, H. E. (1982). Aids to determining fuel models for estimating fire behavior. USFS GTR-INT-122."
  - "Scott, J. H., & Burgan, R. E. (2005). Standard fire behavior fuel models. USFS RMRS-GTR-153."
  - "Aragoneses et al. (2023). ESSD 15, 1287–1300. https://essd.copernicus.org/articles/15/1287/2023/"
  - "Fernandes, P. M. (2009). Combining forest structure data and fuel modelling. Annals of Forest Science 66(4), 415."
  - "Sá et al. (2023). A method to produce a flexible and customized fuel models dataset. MethodsX 10, 102218."
